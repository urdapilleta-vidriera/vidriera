<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyB6Lqm6q3v6NgJez8Q9KmbmmPVmtuLXUF8",
  authDomain: "urdapilleta-vidriera.firebaseapp.com",
  databaseURL: "https://urdapilleta-vidriera-default-rtdb.firebaseio.com",
  projectId: "urdapilleta-vidriera",
  storageBucket: "urdapilleta-vidriera.firebasestorage.app",
  messagingSenderId: "968110210756",
  appId: "1:968110210756:web:6da0773c629ce796a19391"
});
const db = getDatabase(app);

onValue(ref(db, 'vidriera/videoConfig'), (snap) => {
  const data = snap.val();
  const existing = document.querySelector('iframe');
  if (existing) existing.remove();
  
  if (data && data.url) {
    document.getElementById('waiting').style.display = 'none';
    const iframe = document.createElement('iframe');
    iframe.src = data.url;
    iframe.allow = "autoplay; encrypted-media; fullscreen; picture-in-picture";
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-presentation');
    document.body.appendChild(iframe);
  } else {
    document.getElementById('waiting').style.display = 'flex';
  }
});
</script>
