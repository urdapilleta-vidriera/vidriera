  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Karla', sans-serif; }
  .tv-screen { width: 100%; height: 100%; position: relative; background: #000; overflow: hidden; }
  .tv-intro { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 10; transition: opacity 0.8s ease; }
  .tv-intro.hidden { opacity: 0; pointer-events: none; }
  .tv-intro img { width: 55%; max-width: 500px; }
  .intro-bar { width: 60px; height: 1px; background: #2D5A96; opacity: 0.4; }
  .intro-type-badge { padding: 6px 20px; border: 1px solid rgba(45,90,150,0.35); border-radius: 20px; color: #2D5A96; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; }
  .tv-property-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
  .tv-property-slide.active { opacity: 1; pointer-events: auto; }
  .tv-property-slide iframe { width: 100%; height: 100%; border: none; display: block; }
  .tv-no-video { width: 100%; height: 100%; background: linear-gradient(160deg, #0d1020 0%, #162040 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
  .tv-no-video img { width: 30%; max-width: 250px; filter: brightness(0) invert(1); opacity: 0.15; }
  .tv-no-video-txt { font-size: 0.85rem; color: rgba(255,255,255,0.25); }
  .tv-banner { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(10,15,35,0.97) 0%, rgba(10,15,35,0.75) 65%, transparent 100%); padding: 3rem 2.5rem 1.5rem; z-index: 15; }
  .tv-banner-price { font-family: 'EditorNote', 'Karla', sans-serif; font-weight: 100; font-size: 2.2rem; color: #7BA7D4; margin-bottom: 4px; letter-spacing: 0.06em; }
  .tv-banner-name { font-size: 1.4rem; color: #fff; font-weight: 500; margin-bottom: 6px; }
  .tv-banner-loc { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 10px; }
  .tv-banner-specs { display: flex; gap: 10px; flex-wrap: wrap; }
  .tv-spec-pill { background: rgba(45,90,150,0.3); border: 1px solid rgba(123,167,212,0.25); backdrop-filter: blur(4px); padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; color: #c8d4e8; display: flex; align-items: center; gap: 5px; }
  .tv-separator-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; }
  .tv-separator-slide.active { opacity: 1; }
  .tv-separator-slide img { width: 45%; max-width: 400px; }
  .sep-line { width: 50px; height: 1px; background: #2D5A96; opacity: 0.3; margin: 6px 0; }
  .sep-count { font-size: 0.75rem; color: #2D5A96; letter-spacing: 0.12em; text-transform: uppercase; }
  .tv-strip { position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #2D7A4F, #5CBA8A, #2D7A4F); z-index: 20; }
  .tv-progress { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; z-index: 20; }
  .tv-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s; }
  .tv-dot.active { background: #7BA7D4; transform: scale(1.3); }
  .tv-empty { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; background: #fff; }
  .tv-empty img { width: 40%; max-width: 350px; }
  .tv-empty-txt { font-size: 0.9rem; color: #aab0c4; }
</style>
</head>
<body>
<div class="tv-screen" id="tv-screen">
  <div class="tv-strip"></div>
  <div class="tv-progress" id="tv-progress"></div>
</div>
<script type="module">

let tvPlayers = {};

function convertYT(url) {
  if (!url) return '';
  if (url.includes('youtube.com/watch?v=')) {
    const id = url.split('v=')[1].split('&')[0];
    return 'https://www.youtube.com/embed/' + id + '?autoplay=1&mute=1&loop=1&playlist=' + id + '&controls=0&modestbranding=1&playsinline=1&rel=0';
  } else if (url.includes('/embed/')) {
    const id = url.split('/embed/')[1].split('?')[0];
    return url.includes('?') ? url : 'https://www.youtube.com/embed/' + id + '?autoplay=1&mute=1&loop=1&playlist=' + id + '&controls=0&modestbranding=1&playsinline=1&rel=0';
  }
  return url;
}

function buildSlides(list) {
  const s = [{ type: 'intro' }];
  list.forEach((p, i) => {
    s.push({ type: 'property', prop: p });
    if (i < list.length - 1) s.push({ type: 'separator', num: i+1, total: list.length });
  });
  return s;
}

function renderTV(list) {
  if (tvPlayers.timer) clearTimeout(tvPlayers.timer);
  propList = list;
  const container = document.getElementById('tv-screen');
  
  // Remove old slides (keep strip and progress)
  container.querySelectorAll('[data-slide]').forEach(el => el.remove());
  
  if (!list.length) {
    container.innerHTML += `<div class="tv-empty"><img src="${LOGO_SRC}" alt=""><div class="tv-empty-txt">Sin propiedades activas</div></div>`;
    return;
  }

  slides = buildSlides(list);
  let html = '';

  slides.forEach((slide, idx) => {
    if (slide.type === 'intro') {
      html += `<div class="tv-intro" id="slide-${idx}" data-slide="${idx}">
        <img src="${LOGO_SRC}" alt="Urdapilleta">
        <div class="intro-bar"></div>
        <div class="intro-type-badge">${TIPO_NAME}</div>
      </div>`;
    } else if (slide.type === 'separator') {
      html += `<div class="tv-separator-slide" id="slide-${idx}" data-slide="${idx}">
        <img src="${LOGO_SRC}" alt="">
        <div class="sep-line"></div>
        <div class="sep-count">${slide.num} / ${slide.total}</div>
      </div>`;
    } else {
      const p = slide.prop;
      const vsrc = convertYT(p.video);
      const videoContent = vsrc
        ? `<iframe src="${vsrc}" allow="autoplay; encrypted-media; fullscreen" allowfullscreen sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>`
        : `<div class="tv-no-video"><img src="${LOGO_SRC}" alt=""><div class="tv-no-video-txt">Sin video</div></div>`;
      const specs = [];
      if (p.habs) specs.push(`<div class="tv-spec-pill">🛏 ${p.habs}</div>`);
      if (p.banos) specs.push(`<div class="tv-spec-pill">🚿 ${p.banos}</div>`);
      if (p.m2) specs.push(`<div class="tv-spec-pill">📐 ${p.m2}</div>`);
      if (p.tags) p.tags.slice(0,3).forEach(t => specs.push(`<div class="tv-spec-pill">${t}</div>`));
      html += `<div class="tv-property-slide" id="slide-${idx}" data-slide="${idx}">
        ${videoContent}
        <div class="tv-banner">
          <div class="tv-banner-price">${p.precio}</div>
          <div class="tv-banner-name">${p.nombre}</div>
          <div class="tv-banner-loc">📍 ${p.ubicacion}</div>
          <div class="tv-banner-specs">${specs.join('')}</div>
        </div>
      </div>`;
    }
  });

  // Insert slides before strip
  const strip = container.querySelector('.tv-strip');
  strip.insertAdjacentHTML('afterend', html);

  // Progress dots
  const progress = document.getElementById('tv-progress');
  progress.innerHTML = list.map((_, i) => `<div class="tv-dot${i===0?' active':''}" id="dot-${i}"></div>`).join('');

  currentIdx = 0;
  showSlide(0);
  scheduleNext();
}

function showSlide(idx) {
  document.querySelectorAll('[data-slide]').forEach(el => {
    el.classList.remove('active');
    if (el.classList.contains('tv-intro')) el.classList.add('hidden');
  });
  const target = document.getElementById('slide-' + idx);
  if (!target) { currentIdx = 0; showSlide(0); return; }
  if (target.classList.contains('tv-intro')) target.classList.remove('hidden');
  else target.classList.add('active');
  const slide = slides[idx];
  if (slide && slide.type === 'property') {
    const pi = propList.findIndex(p => p.id === slide.prop.id);
    document.querySelectorAll('.tv-dot').forEach((d,i) => d.classList.toggle('active', i===pi));
  }
}

const DURATIONS = { intro: 3000, property: 12000, separator: 2500 };
function scheduleNext() {
  if (tvPlayers.timer) clearTimeout(tvPlayers.timer);
  const dur = slides[currentIdx] ? DURATIONS[slides[currentIdx].type] || 5000 : 5000;
  tvPlayers.timer = setTimeout(() => {
    currentIdx = (currentIdx + 1) % slides.length;
    showSlide(currentIdx);
    scheduleNext();
  }, dur);
}

onValue(ref(db, 'vidriera'), (snap) => {
  const data = snap.val();
  if (!data || !data.propiedades) return;
  const filtered = data.propiedades.filter(p => p.tipo === TIPO && p.estado === 'activo');
  renderTV(filtered);
});
</script>
